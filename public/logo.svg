<svg viewBox="0 0 400 88" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Audiowide&amp;display=swap');
      .t  { font-family: 'Audiowide', 'Helvetica Neue', sans-serif; }
    </style>

    <!-- T mark gradients -->
    <radialGradient id="icon-bg" cx="50%" cy="0%" r="75%"
                    gradientUnits="userSpaceOnUse" x1="44" y1="0" x2="44" y2="88">
      <stop offset="0%"   stop-color="#2563EB" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stem-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3B82F6" stop-opacity="0.55"/>
      <stop offset="20%"  stop-color="white"   stop-opacity="1"/>
      <stop offset="100%" stop-color="white"   stop-opacity="1"/>
    </linearGradient>

    <!-- Wordmark text gradient -->
    <linearGradient id="text-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#C8C8C8"/>
    </linearGradient>
  </defs>

  <!-- ─── T MARK ICON (88 × 88) ─────────────────────────────────────── -->
  <!-- Background rounded square -->
  <rect width="88" height="88" rx="18" fill="#0A0A0A"/>
  <rect x="1" y="1" width="86" height="86" rx="17"
        stroke="white" stroke-opacity="0.07" stroke-width="0.75"/>
  <rect width="88" height="88" rx="18" fill="url(#icon-bg)"/>

  <!-- Crossbar -->
  <rect x="13" y="19" width="62" height="12" rx="3.5" fill="white"/>
  <!-- Stem with blue-tinted gradient at top -->
  <rect x="37.5" y="19" width="13" height="52" rx="3.5" fill="url(#stem-g)"/>

  <!-- Circuit trace through crossbar -->
  <rect x="13" y="24.5" width="62" height="1.5" fill="#2563EB" opacity="0.2"/>

  <!-- Left node -->
  <circle cx="17"  cy="25" r="6.5"  fill="#2563EB" opacity="0.14"/>
  <circle cx="17"  cy="25" r="4"    fill="#2563EB" opacity="0.88"/>
  <!-- Right node -->
  <circle cx="71"  cy="25" r="6.5"  fill="#2563EB" opacity="0.14"/>
  <circle cx="71"  cy="25" r="4"    fill="#2563EB" opacity="0.88"/>
  <!-- Centre junction node -->
  <circle cx="44"  cy="25" r="9"    fill="#2563EB" opacity="0.18"/>
  <circle cx="44"  cy="25" r="6"    fill="#2563EB"/>
  <circle cx="41.5" cy="22.5" r="1.8" fill="white" opacity="0.35"/>

  <!-- Bottom stem accent -->
  <circle cx="44" cy="69" r="2.5" fill="#2563EB" opacity="0.28"/>

  <!-- ─── DIVIDER LINE ─────────────────────────────────────────────────── -->
  <line x1="110" y1="20" x2="110" y2="68"
        stroke="white" stroke-opacity="0.12" stroke-width="1"/>

  <!-- ─── WORDMARK ─────────────────────────────────────────────────────── -->
  <!-- "TITAN" -->
  <text class="t" x="126" y="47"
        fill="url(#text-g)"
        font-size="26"
        font-weight="400"
        letter-spacing="2">TITAN</text>

  <!-- Accent bar below TITAN -->
  <rect x="126" y="52" width="46" height="1.5" rx="0.75" fill="#2563EB" opacity="0.7"/>

  <!-- "AUTOMATIONS" -->
  <text class="t" x="126" y="67"
        fill="#888888"
        font-size="10.5"
        font-weight="400"
        letter-spacing="3.5">AUTOMATIONS</text>
</svg>
